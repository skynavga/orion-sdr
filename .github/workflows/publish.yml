name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wheels:
    name: Build ${{ matrix.target }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux aarch64 (cross-compiled via QEMU)
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # macOS x86-64 (cross-compiled on arm64 runner)
          - os: macos-latest
            target: x86_64
            manylinux: ''
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64
            manylinux: ''
          # Windows x86-64
          - os: windows-latest
            target: x86_64
            manylinux: ''

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --profile release --out dist
          sccache: 'true'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/orion-sdr
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
